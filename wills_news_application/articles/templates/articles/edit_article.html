<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article</title>
    <style>
        :root {
            --primary: #1e293b;       
            --accent: #2563eb;        
            --success: #16a34a;       
            --warning: #ca8a04;       
            --background: #f8fafc;    
            --surface: #ffffff;       
            --text-main: #0f172a;     
            --text-muted: #64748b;    
            --border: #e2e8f0;        
            --radius: 8px;            
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border);
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        h1, h2, h3 {
            color: var(--primary);
            font-weight: 700;
        }

        .form-wrapper {
            max-width: 550px;
            margin: 2rem auto;
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.65rem 0.75rem;
            font-size: 0.95rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background-color: var(--background);
            color: var(--text-main);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            background-color: var(--surface);
        }

        .btn {
            display: inline-block;
            padding: 0.6rem 1.25rem;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #15803d; }

        .btn-muted { background: var(--text-muted); color: #fff; }
        .btn-muted:hover { background: #475569; }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <div class="nav-links">
                <h2>NewsApp Desk</h2>
            </div>
            <div class="nav-links">
                <a href="{% url 'home' %}">Discard Changes</a>
            </div>
        </div>

        <div class="form-wrapper">
            <h1 style="margin-bottom: 1.5rem; font-size: 1.75rem;">Modify Article Configuration</h1>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="{{ form.title.id_for_label }}">Headline</label>
                    {{ form.title }}
                </div>
                <div class="form-group">
                    <label for="{{ form.publisher.id_for_label }}">Publishing Source</label>
                    {{ form.publisher }}
                </div>
                <div class="form-group">
                    <label for="{{ form.content.id_for_label }}">Article Body Content</label>
                    {{ form.content }}
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-success" style="flex: 1;">Save Changes</button>
                    <a href="{% url 'home' %}" class="btn btn-muted">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
